<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSRU CCTV Monitor</title>
<style>
/* ═══ Reset & Variables ═══ */
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --border:   #30363d;
  --accent:   #238636;
  --blue:     #1f6feb;
  --warn:     #d29922;
  --danger:   #da3633;
  --text:     #c9d1d9;
  --muted:    #8b949e;
  --green:    #3fb950;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', -apple-system, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ═══ Config Bar (hidden after setup) ═══ */
#config-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
#config-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
#apps-url-input {
  flex: 1; min-width: 200px;
  padding: 5px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
#apps-url-input:focus { border-color: var(--blue); }
#config-bar .btn-sm {
  padding: 5px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}
.btn-apply { background: var(--accent); color: #fff; }
.btn-apply:hover { background: #2ea043; }
.btn-hide { background: var(--surface2); color: var(--muted); border: 1px solid var(--border) !important; border: none; }
.btn-hide:hover { color: var(--text); }
#config-bar.hidden { display: none; }

/* ═══ Header ═══ */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo { font-size: 15px; font-weight: 700; }
.server-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
  background: var(--surface2);
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; }
.status-dot.ok  { background: var(--green); }
.status-dot.err { background: var(--danger); }
.status-dot.loading { background: var(--warn); animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.spacer { flex: 1; }
.clock { font-size: 13px; font-family: monospace; color: var(--muted); }

/* Device selector */
#device-select {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  outline: none;
  max-width: 200px;
}

/* Layout buttons */
.layout-group { display: flex; gap: 3px; }
.lbtn {
  width: 28px; height: 28px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.lbtn:hover { background: var(--surface2); color: var(--text); }
.lbtn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* Config toggle */
.cfg-btn {
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
}
.cfg-btn:hover { background: var(--surface2); color: var(--text); }

/* ═══ Main ═══ */
.main-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══ Sidebar ═══ */
.sidebar {
  width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-title {
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .7px;
  border-bottom: 1px solid var(--border);
}
.ch-item {
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background .1s;
}
.ch-item:hover { background: var(--surface2); }
.ch-item.active { background: rgba(31,111,235,.15); border-left: 2px solid var(--blue); }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; flex-shrink: 0; }
.ch-dot.ok  { background: var(--green); }
.ch-dot.err { background: var(--danger); }
.ch-dot.loading { background: var(--warn); animation: blink .8s infinite; }
.ch-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-num { font-size: 10px; color: var(--muted); font-family: monospace; }

/* ═══ Grid ═══ */
.grid-wrap {
  flex: 1;
  overflow: hidden;
  display: grid;
  gap: 2px;
  background: #000;
  padding: 2px;
}
.grid-wrap.g1  { grid-template-columns: 1fr; }
.grid-wrap.g2  { grid-template-columns: 1fr 1fr; }
.grid-wrap.g4  { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-wrap.g6  { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-wrap.g9  { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.grid-wrap.g16 { grid-template-columns: repeat(4,1fr); grid-template-rows: repeat(4,1fr); }

/* Camera cell */
.cam-cell {
  background: #080808;
  position: relative;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
}
.cam-cell:hover { outline: 1px solid var(--blue); }
.cam-cell img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.cam-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.85));
  padding: 18px 8px 5px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
  pointer-events: none;
}
.cam-label-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; flex-shrink: 0; }
.cam-label-dot.ok { background: var(--green); }
.cam-label-dot.err { background: var(--danger); }
.cam-ts {
  margin-left: auto;
  font-size: 9px;
  color: rgba(255,255,255,.4);
  font-family: monospace;
}
.cam-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; color: var(--muted);
  font-size: 12px;
  text-align: center;
  padding: 10px;
}
.cam-overlay .ov-icon { font-size: 32px; opacity: .25; }

/* ═══ Empty State ═══ */
#setup-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 32px;
  text-align: center;
}
#setup-screen h2 { font-size: 20px; }
#setup-screen p { font-size: 14px; color: var(--muted); max-width: 400px; line-height: 1.6; }
#setup-screen code {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 12px;
  color: #79c0ff;
  display: block;
  text-align: left;
  width: 100%;
  max-width: 460px;
  line-height: 1.6;
}

/* ═══ Scrollbar ═══ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══ Toast ═══ */
#toast {
  position: fixed; bottom: 16px; right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 9px 15px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 999;
  transform: translateY(40px);
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 600px) {
  .sidebar { display: none; }
  .clock { display: none; }
}
</style>
</head>
<body>

<!-- ── Config Bar ── -->
<div id="config-bar">
  <label>🔗 Apps Script URL:</label>
  <input id="apps-url-input" type="text"
    value="https://script.google.com/macros/s/AKfycby8woPf2DZklUO7TsYowdOiGdP7IKSSa9PSAAqsjvyolmTinx3TcXODHoVKlkl3CmIwaw/exec">
  <button class="btn-sm btn-apply" onclick="applyConfig()">✔ Apply</button>
  <button class="btn-sm btn-hide" onclick="hideConfig()">✕ ซ่อน</button>
</div>

<!-- ── Header ── -->
<header>
  <span class="logo">📷 PSRU CCTV</span>

  <div class="server-status" id="server-status">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-text">กำลังเชื่อมต่อ...</span>
  </div>

  <select id="device-select" onchange="switchDevice(this.value)">
    <option value="">— เลือก NVR —</option>
  </select>

  <div class="layout-group">
    <button class="lbtn active" id="lb1"  title="1 กล้อง"  onclick="setLayout(1)">1</button>
    <button class="lbtn"        id="lb2"  title="2 กล้อง"  onclick="setLayout(2)">2</button>
    <button class="lbtn"        id="lb4"  title="4 กล้อง"  onclick="setLayout(4)">4</button>
    <button class="lbtn"        id="lb6"  title="6 กล้อง"  onclick="setLayout(6)">6</button>
    <button class="lbtn"        id="lb9"  title="9 กล้อง"  onclick="setLayout(9)">9</button>
    <button class="lbtn"        id="lb16" title="16 กล้อง" onclick="setLayout(16)">16</button>
  </div>

  <span class="spacer"></span>
  <span class="clock" id="clock">--:--:--</span>
  <button class="cfg-btn" onclick="toggleConfig()">⚙ ตั้งค่า</button>
</header>

<!-- ── Main Content ── -->
<div class="main-wrap" id="main-wrap">

  <!-- Sidebar: channel list -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title" id="sidebar-device-name">กล้อง</div>
    <div id="ch-list"></div>
  </aside>

  <!-- Setup screen (shown before config) -->
  <div id="setup-screen">
    <div style="font-size:56px;opacity:.2">📡</div>
    <h2>PSRU CCTV Monitor</h2>
    <p>ป้อน Apps Script URL ด้านบน แล้วกด <strong>Apply</strong> เพื่อเริ่มดูภาพกล้อง</p>
    <code>
Apps Script URL คือ URL ที่ได้จาก:<br>
Google Apps Script → Deploy → Manage Deployments<br>
→ Copy Web App URL<br><br>
ตัวอย่าง:<br>
https://script.google.com/macros/s/AKfy.../exec
    </code>
  </div>

  <!-- Camera grid (hidden until configured) -->
  <div class="grid-wrap g4" id="grid" style="display:none"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let APPS_URL       = localStorage.getItem('psru_apps_url') || '';
let devices        = [];
let currentDevice  = null;
let currentLayout  = 4;
let shownChannels  = [];     // channel numbers currently shown in grid
let refreshTimers  = {};
let cellStatus     = {};     // ch → 'ok'|'err'|'loading'
const REFRESH_MS   = 4000;   // รีเฟรชทุก 4 วินาที

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 1000);

  if (APPS_URL) {
    document.getElementById('apps-url-input').value = APPS_URL;
    document.getElementById('config-bar').classList.add('hidden');
    init();
  } else {
    document.getElementById('config-bar').classList.remove('hidden');
  }
});

function init() {
  if (!APPS_URL) return;
  setStatus('loading', 'กำลังเชื่อมต่อ...');
  fetchDevices();
}

// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
function applyConfig() {
  const val = document.getElementById('apps-url-input').value.trim();
  if (!val || !val.startsWith('https://')) {
    toast('⚠️ URL ต้องเริ่มต้นด้วย https://');
    return;
  }
  APPS_URL = val;
  localStorage.setItem('psru_apps_url', APPS_URL);
  document.getElementById('config-bar').classList.add('hidden');
  stopAllRefresh();
  init();
  toast('✅ บันทึก URL แล้ว');
}

function toggleConfig() {
  const bar = document.getElementById('config-bar');
  bar.classList.toggle('hidden');
}

function hideConfig() {
  document.getElementById('config-bar').classList.add('hidden');
}

// ═══════════════════════════════════════════
//  FETCH DEVICES LIST
// ═══════════════════════════════════════════
async function fetchDevices() {
  try {
    const url = `${APPS_URL}?action=devices&_=${Date.now()}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!data.ok || !data.devices) throw new Error(data.error || 'No devices');

    devices = data.devices;
    populateDeviceSelect();

    // Auto-select first device
    if (devices.length > 0) {
      switchDevice(devices[0].id);
    }

    setStatus('ok', `VPS Online · ${devices.length} NVR`);
    toast('✅ เชื่อมต่อสำเร็จ');

  } catch (err) {
    setStatus('err', 'ไม่สามารถเชื่อมต่อ VPS');
    showSetupScreen();
    toast('❌ ' + err.message);
    console.error('[fetchDevices]', err);
  }
}

// ═══════════════════════════════════════════
//  DEVICE SELECT
// ═══════════════════════════════════════════
function populateDeviceSelect() {
  const sel = document.getElementById('device-select');
  sel.innerHTML = devices.map(d =>
    `<option value="${d.id}">${d.label}</option>`
  ).join('');
}

function switchDevice(deviceId) {
  currentDevice = devices.find(d => d.id === deviceId);
  if (!currentDevice) return;

  document.getElementById('device-select').value = deviceId;
  stopAllRefresh();
  renderSidebar();
  showGrid();

  // Default: show first N channels based on layout
  const allChs = Object.keys(currentDevice.chLabels || {}).map(Number);
  shownChannels = allChs.slice(0, currentLayout);
  renderGrid();
}

// ═══════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  if (!currentDevice) return;
  const labels = currentDevice.chLabels || {};
  document.getElementById('sidebar-device-name').textContent =
    currentDevice.label + ` (${currentDevice.channels}ch)`;

  const list = document.getElementById('ch-list');
  list.innerHTML = Object.entries(labels).map(([ch, name]) => `
    <div class="ch-item" id="chi_${ch}" onclick="focusChannel(${ch})">
      <div class="ch-dot loading" id="chd_${ch}"></div>
      <span class="ch-name">${name}</span>
      <span class="ch-num">CH${ch}</span>
    </div>
  `).join('');
}

function updateSidebarDot(ch, state) {
  const dot = document.getElementById('chd_' + ch);
  if (dot) {
    dot.className = 'ch-dot ' + state;
  }
}

function focusChannel(ch) {
  setLayout(1);
  shownChannels = [ch];
  renderGrid();
  // Highlight in sidebar
  document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('chi_' + ch);
  if (item) item.classList.add('active');
}

// ═══════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════
function setLayout(n) {
  currentLayout = n;
  ['1','2','4','6','9','16'].forEach(k => {
    document.getElementById('lb' + k)?.classList.remove('active');
  });
  document.getElementById('lb' + n)?.classList.add('active');

  if (currentDevice) {
    const allChs = Object.keys(currentDevice.chLabels || {}).map(Number);
    shownChannels = allChs.slice(0, n);
    renderGrid();
  }
}

// ═══════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════
function showGrid() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('grid').style.display = '';
}

function showSetupScreen() {
  document.getElementById('setup-screen').style.display = '';
  document.getElementById('grid').style.display = 'none';
}

function renderGrid() {
  stopAllRefresh();
  if (!currentDevice) return;

  const grid = document.getElementById('grid');
  grid.className = 'grid-wrap g' + currentLayout;
  const labels = currentDevice.chLabels || {};

  // Pad to fill grid if not enough channels
  const cells = [];
  for (let i = 0; i < currentLayout; i++) {
    const ch = shownChannels[i];
    if (ch !== undefined) {
      cells.push(buildCell(ch, labels[ch] || `CH${ch}`));
    } else {
      cells.push(`<div class="cam-cell"><div class="cam-overlay"><div class="ov-icon">＋</div><span>ว่าง</span></div></div>`);
    }
  }
  grid.innerHTML = cells.join('');

  // Start refreshing visible channels
  shownChannels.forEach(ch => startRefreshCell(ch));
}

function buildCell(ch, label) {
  return `
    <div class="cam-cell" id="cell_${ch}" onclick="focusChannel(${ch})">
      <div class="cam-overlay" id="ov_${ch}">
        <div class="ov-icon">📷</div>
        <span>CH${ch} · ${label}</span>
      </div>
      <div class="cam-label">
        <div class="cam-label-dot loading" id="ld_${ch}"></div>
        <span>${label}</span>
        <span class="cam-ts" id="ts_${ch}"></span>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  SNAPSHOT REFRESH
// ═══════════════════════════════════════════
function startRefreshCell(ch) {
  fetchSnapshot(ch);
  refreshTimers[ch] = setInterval(() => fetchSnapshot(ch), REFRESH_MS);
}

function stopAllRefresh() {
  Object.values(refreshTimers).forEach(clearInterval);
  refreshTimers = {};
}

async function fetchSnapshot(ch) {
  if (!APPS_URL || !currentDevice) return;

  const url = `${APPS_URL}?action=snapshot&device=${currentDevice.id}&ch=${ch}&_=${Date.now()}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    if (data.ok && data.data) {
      const src = 'data:' + data.mime + ';base64,' + data.data;
      updateCell(ch, src, true, data.timestamp);
    } else {
      updateCell(ch, null, false, null);
    }
  } catch (err) {
    updateCell(ch, null, false, null);
  }
}

function updateCell(ch, src, ok, ts) {
  const cell = document.getElementById('cell_' + ch);
  if (!cell) return;

  const ov = document.getElementById('ov_' + ch);
  const ld = document.getElementById('ld_' + ch);
  const tsEl = document.getElementById('ts_' + ch);

  if (ok && src) {
    // Remove overlay, show image
    if (ov) ov.style.display = 'none';

    let img = cell.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      cell.insertBefore(img, cell.querySelector('.cam-label'));
    }
    img.src = src;

    if (ld) { ld.className = 'cam-label-dot ok'; }
    updateSidebarDot(ch, 'ok');

    if (tsEl && ts) {
      const d = new Date(ts);
      tsEl.textContent = d.toLocaleTimeString('th-TH');
    }
  } else {
    // Show error overlay
    if (ov) {
      ov.style.display = '';
      ov.innerHTML = `<div class="ov-icon" style="font-size:24px">📵</div><span style="color:#666">ไม่มีสัญญาณ CH${ch}</span>`;
    }
    if (ld) { ld.className = 'cam-label-dot err'; }
    updateSidebarDot(ch, 'err');
  }
}

// ═══════════════════════════════════════════
//  STATUS & UI HELPERS
// ═══════════════════════════════════════════
function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (dot) dot.className = 'status-dot ' + state;
  if (txt) txt.textContent = text;
}

function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('th-TH');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '1') setLayout(1);
  if (e.key === '2') setLayout(2);
  if (e.key === '4') setLayout(4);
  if (e.key === '9') setLayout(9);
});
</script>
</body>
</html>
